services:
  postgres:
    image: postgres:16-alpine
    container_name: messaging-board-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging_board
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
